name: dev_Pipeline

on:
  push:
    branches:
      - main 
      - kiran_pytest
  pull_request:
    branches:
      - main 
      - kiran_pytest

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, 3.10.4, 3.11]  

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt  
          pip install -r requirements.txt  

      - name: Run tests
        run: |
          pytest -n auto --maxfail=1 --cov=. --cov-report=term  

      - name: Generate HTML coverage report
        run: |
          pytest --cov=. --cov-report=html  # Generate HTML report
    
      - name: Compress coverage report
        run: |
          tar -czf coverage-report.tar.gz htmlcov/  
  
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage-report.tar.gz